# Render Blueprint — deploy PaintCRM (Express API + built Vite frontend) on the
# free tier with no credit card. Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Create a free Postgres on Neon (https://neon.tech) — no card required.
#   2. Render Dashboard → New + → Blueprint → connect this repo.
#   3. When prompted, paste your Neon connection string as DATABASE_URL.
#
# The Docker image (server/Dockerfile) builds the frontend and, on start, runs
# migrations then boots the server. Render injects PORT automatically and the
# app binds to it (index.js uses process.env.PORT).
#
# BRANCH POLICY
# -------------
# `branch` is intentionally pinned to the branch that currently powers the
# public demo (paintcrm.brohammad.tech). Do NOT silently flip this to `main`
# without verifying that main has the same deploy-critical fixes — a mismatch
# will auto-deploy a different tree on the next push.
#
# When the demo-stable work is merged to main:
#   1. Change `branch` below to `main`
#   2. Confirm ALLOWED_ORIGINS still matches the live custom domain + Render URL
#   3. Watch the first auto-deploy health check
services:
  - type: web
    name: paintcrm
    runtime: docker
    plan: free
    region: singapore
    # Demo-stable branch (see BRANCH POLICY above). Revisit when merging to main.
    branch: cursor/fix-production-hardening-issues
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Public URL(s) allowed by CORS (comma-separated). Required at boot.
      - key: ALLOWED_ORIGINS
        value: https://paintcrm.brohammad.tech,https://paintcrm-5k17.onrender.com
      # Auto-generated secure secret (>=32 chars satisfies the production guard).
      - key: JWT_SECRET
        generateValue: true
      # Neon requires TLS; NODE_ENV=production already enables it. If Neon's cert
      # chain is ever rejected, add DB_SSL_REJECT_UNAUTHORIZED=false.
      - key: DATABASE_URL
        sync: false
